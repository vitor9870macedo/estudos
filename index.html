<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciador de Alunos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #0f0f11;
      --bg2: #17171a;
      --bg3: #1e1e22;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --muted: #888;
      --accent: #7c6aff;
      --accent-dim: rgba(124, 106, 255, 0.12);
      --green: #3ecf8e;
      --green-dim: rgba(62, 207, 142, 0.12);
      --yellow: #f5a623;
      --yellow-dim: rgba(245, 166, 35, 0.12);
      --red: #e55353;
      --red-dim: rgba(229, 83, 83, 0.12);
      --radius: 10px;
      --radius-sm: 6px;
    }
 
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }
 
    /* ── header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
    }
    header h1 {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    header span {
      font-size: 13px;
      color: var(--muted);
      margin-left: 4px;
    }
 
    /* ── layout ── */
    .shell {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: calc(100vh - 61px);
    }
 
    /* ── sidebar ── */
    aside {
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
 
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px;
    }
 
    /* form */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    label {
      font-size: 12px;
      color: var(--muted);
    }
    input[type="text"],
    input[type="number"] {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      outline: none;
      transition: border 0.15s;
      width: 100%;
      font-family: inherit;
    }
    input:focus {
      border-color: var(--accent);
    }
 
    .notas-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
 
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }
 
    /* stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
    }
    .stat-card .stat-val {
      font-size: 22px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card .stat-lbl {
      font-size: 11px;
      color: var(--muted);
    }
    .stat-card.s-total .stat-val { color: var(--accent); }
    .stat-card.s-ok    .stat-val { color: var(--green); }
    .stat-card.s-rec   .stat-val { color: var(--yellow); }
    .stat-card.s-rep   .stat-val { color: var(--red); }
 
    /* filtros */
    .filter-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--border2); color: var(--text); }
    .chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
 
    /* ── main ── */
    main {
      padding: 24px;
      overflow-y: auto;
    }
 
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .top-bar h2 {
      font-size: 14px;
      font-weight: 500;
    }
    #busca {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 7px 12px;
      border-radius: var(--radius-sm);
      outline: none;
      width: 200px;
      font-family: inherit;
      transition: border 0.15s;
    }
    #busca:focus { border-color: var(--accent); }
 
    /* tabela */
    .table-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead tr {
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    th {
      text-align: left;
      padding: 11px 16px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }
    td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
 
    .aluno-nome {
      font-weight: 500;
      font-size: 13px;
    }
    .aluno-id {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
 
    .nota-pill {
      display: inline-block;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: center;
    }
 
    .media-val {
      font-size: 14px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
 
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .badge.aprovado   { background: var(--green-dim);  color: var(--green);  }
    .badge.aprovado::before  { background: var(--green); }
    .badge.recuperacao { background: var(--yellow-dim); color: var(--yellow); }
    .badge.recuperacao::before { background: var(--yellow); }
    .badge.reprovado  { background: var(--red-dim);    color: var(--red);    }
    .badge.reprovado::before  { background: var(--red); }
 
    .btn-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .btn-del:hover { color: var(--red); background: var(--red-dim); }
 
    /* empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }
    .empty p { font-size: 13px; }
 
    /* toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 13px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
 
    /* progress bar turma */
    .progress-block { margin-top: 4px; }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }
    .progress-lbl { font-size: 11px; color: var(--muted); width: 80px; flex-shrink: 0; }
    .progress-bar-bg {
      flex: 1;
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }
    .fill-green  { background: var(--green); }
    .fill-yellow { background: var(--yellow); }
    .fill-red    { background: var(--red); }
    .progress-pct { font-size: 11px; color: var(--muted); width: 28px; text-align: right; }

    .aviso {
    
      display: none;
      justify-content: end;
      top: 0;
      left: 0;
      width: 30%;
      background-color: #025a02;
      color: #ffffff;
      text-align: center;
      padding: 10px;
      font-weight: bold;
      z-index: 1000;
    }
  </style>
</head>
<body>
 
<header>
  <div class="logo-dot"></div>
  <h1>Gerenciador de Alunos <span>— Turma Fullstack IA</span></h1>
  <div class="aviso"></div>
</header>
 
<div class="shell">
  <!-- ── sidebar ── -->
  <aside>
    <!-- form de cadastro -->
    <div>
      <p class="section-label">Novo aluno</p>
      <div class="form-group">
        <label for="inp-nome">Nome completo</label>
        <input type="text" id="inp-nome" placeholder="Ex: Maria Fernandes" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Notas (N1 · N2 · N3)</label>
        <div class="notas-row">
          <input type="number" id="inp-n1" placeholder="N1" min="0" max="10" step="0.1" />
          <input type="number" id="inp-n2" placeholder="N2" min="0" max="10" step="0.1" />
          <input type="number" id="inp-n3" placeholder="N3" min="0" max="10" step="0.1" />
        </div>
      </div>
      <button class="btn-primary" id="btn-add">Adicionar aluno</button>
    </div>
 
    <!-- stats -->
    <div>
      <p class="section-label">Turma</p>
      <div class="stats-grid">
        <div class="stat-card s-total">
          <div class="stat-val" id="total">0</div>
          <div class="stat-lbl">Total</div>
        </div>
        <div class="stat-card s-ok">
          <div class="stat-val" id="aprovados">0</div>
          <div class="stat-lbl">Aprovados</div>
        </div>
        <div class="stat-card s-rec">
          <div class="stat-val" id="recuperacao">0</div>
          <div class="stat-lbl">Recuperação</div>
        </div>
        <div class="stat-card s-rep">
          <div class="stat-val" id="reprovados">0</div>
          <div class="stat-lbl">Reprovados</div>
        </div>
      </div>
 
      <!-- progress bars -->
      <div class="progress-block" id="progress-block" style="margin-top:14px; display:none;">
        <div class="progress-row">
          <span class="progress-lbl">Aprovados</span>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill fill-green" id="bar-ap" style="width:0%"></div>
          </div>
          <span class="progress-pct" id="pct-ap">0%</span>
        </div>
        <div class="progress-row">
          <span class="progress-lbl">Recuperação</span>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill fill-yellow" id="bar-rec" style="width:0%"></div>
          </div>
          <span class="progress-pct" id="pct-rec">0%</span>
        </div>
        <div class="progress-row">
          <span class="progress-lbl">Reprovados</span>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill fill-red" id="bar-rep" style="width:0%"></div>
          </div>
          <span class="progress-pct" id="pct-rep">0%</span>
        </div>
      </div>
    </div>
 
    <!-- filtros -->
    <div>
      <p class="section-label">Filtrar por situação</p>
      <div class="filter-row">
        <button class="chip active" id="btn-todos" data-filtro="todos">Todos</button>
        <button class="chip" id="btn-aprovados" data-filtro="aprovado">Aprovados</button>
        <button class="chip" id="btn-recuperacao" data-filtro="recuperacao">Recuperação</button>
        <button class="chip" id="btn-reprovados" data-filtro="reprovado">Reprovados</button>
      </div>
    </div>
  </aside>
  
  <!-- ── main ── -->
  <main>
    <div class="top-bar">
      <h2 id="lista-titulo">Lista de alunos</h2>
      <input type="text" id="busca" placeholder="Buscar aluno..." />
    </div>
 
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Aluno</th>
            <th>N1</th>
            <th>N2</th>
            <th>N3</th>
            <th>Média</th>
            <th>Situação</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabela-body">
          <!-- JS preenche aqui -->
        </tbody>
      </table>
      <div class="empty" id="empty-state" style="display:none;">
        <div class="empty-icon">📋</div>
        <p>Nenhum aluno encontrado.</p>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</div>
 
<div id="toast"></div>
